name: System Packages CI

on:
  push:
    branches: [main]
    paths:
      - "**.c"
      - "**.h"
      - "**.cpp"
      - "**.hpp"
      - "**.hxx"
      - "meson.build"
      - "meson_options.txt"
      - "**/meson.build"
      - "subprojects/*.wrap"
      - ".github/workflows/system-packages.yml"
  pull_request:
    paths:
      - "**.c"
      - "**.h"
      - "**.cpp"
      - "**.hpp"
      - "**.hxx"
      - "meson.build"
      - "meson_options.txt"
      - "**/meson.build"
      - "subprojects/*.wrap"
      - ".github/workflows/system-packages.yml"

jobs:
  build:
    name: ${{ matrix.platform.name }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.platform.image }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        platform:
          - name: Ubuntu (GCC 15)
            image: ubuntu-24.04
            cc: gcc-15
            cxx: g++-15
          - name: macOS (Clang)
            image: macos-latest
            cc: clang
            cxx: clang++
    env:
      MESON_VERSION: "1.7.2"
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # -- Toolchain & packages --
      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 ccache
          sudo apt-get install -y \
            libfmt-dev libspdlog-dev libeigen3-dev \
            nlohmann-json3-dev catch2 \
            libvulkan-dev glslang-dev libshaderc-dev \
            libglfw3-dev \
            qt6-base-dev libqt6opengl6-dev libqt6openglwidgets6-dev \
            libgl-dev libgl1-mesa-dev \
            libx11-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev \
            libxau-dev libxaw7-dev libxcomposite-dev libxcursor-dev \
            libxdamage-dev libxfixes-dev libxi-dev libxinerama-dev \
            libxkbfile-dev libxmuu-dev libxrandr-dev libxrender-dev \
            libxres-dev libxss-dev libxtst-dev libxv-dev libxxf86vm-dev \
            libxcb-glx0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev \
            libxcb-dri3-dev uuid-dev libxcb-cursor-dev libxcb-dri2-0-dev \
            libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev \
            libxcb-res0-dev libxcb-util-dev

      - name: Install packages (macOS)
        if: runner.os == 'macOS'
        run: brew install spdlog fmt catch2 nlohmann-json cli11 eigen ccache

      - name: Install Meson and Ninja
        run: python -m pip install meson==${{ env.MESON_VERSION }} ninja

      # -- Caches --
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.platform.image }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.platform.image }}-${{ matrix.build_type }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache subproject downloads
        uses: actions/cache@v5
        with:
          path: subprojects/packagecache
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}

      # -- Build & Test --
      - name: Configure
        env:
          CC: ccache ${{ matrix.platform.cc }}
          CXX: ccache ${{ matrix.platform.cxx }}
        run: >
          meson setup build/
          --buildtype=${{ matrix.build_type }}
          -Dtesting=true

      - name: Build
        run: meson compile -C build/

      - name: ccache stats
        run: ccache -s

      - name: Test
        run: meson test -C build/ -v

      - name: Upload test log
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ matrix.platform.name }}-${{ matrix.build_type }}-testlog
          path: build/meson-logs/testlog.txt
